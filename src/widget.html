<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polls Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .header-count { font-size: 11px; color: #6b7280; }

    .poll-list {
      flex: 1;
      overflow-y: auto;
    }

    .poll-row {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 14px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background .1s;
    }
    .poll-row:last-child { border-bottom: none; }
    .poll-row:hover { background: #f9fafb; }

    .vote-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
      background: #e5e7eb;
    }
    .vote-dot.voted { background: #059669; }
    .vote-dot.pending { background: #f59e0b; }

    .poll-main { flex: 1; min-width: 0; }
    .poll-question {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
    }
    .poll-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 1px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .voted-badge {
      font-size: 10px;
      font-weight: 700;
      color: #059669;
      background: #d1fae5;
      padding: 1px 5px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .vote-badge {
      font-size: 10px;
      font-weight: 700;
      color: #d97706;
      background: #fef3c7;
      padding: 1px 5px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .footer {
      padding: 7px 14px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #f9fafb;
    }
    .new-link {
      font-size: 11px;
      font-weight: 600;
      background: #111827;
      color: #fff;
      padding: 3px 10px;
      border-radius: 6px;
      text-decoration: none;
    }
    .open-link {
      font-size: 11px;
      font-weight: 600;
      color: #111827;
      text-decoration: none;
    }
    .open-link:hover { text-decoration: underline; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 12px;
      gap: 4px;
    }
  </style>
</head>
<body>
<script type="module">
import { isPollOpen, hasVoted, totalUpVotes, expiryLabel } from "./logic.js";
import { esc } from "/hub-sdk.js";

const STORE      = window.__STORE_URL   ?? "";
const APP_ID     = window.__APP_ID      ?? "family-polls";
const HUB_MEMBER = window.__CURRENT_MEMBER ?? null;

async function kv(key) {
  if (!STORE) return null;
  try {
    const res  = await fetch(`${STORE}?key=${encodeURIComponent(key)}`);
    const json = await res.json();
    return json.value ? JSON.parse(json.value) : null;
  } catch { return null; }
}

async function load() {
  const data = await kv("data");
  const allPolls = data?.polls ?? [];
  const openPolls = allPolls.filter(isPollOpen);

  if (openPolls.length === 0) { render([], {}); return; }

  // Load vote data for the first 5 open polls in parallel
  const visible = openPolls.slice(0, 5);
  const voteEntries = await Promise.all(
    visible.map(p => kv(`v:${p.id}`).then(v => [p.id, v ?? {}]))
  );
  const votes = Object.fromEntries(voteEntries);

  render(visible, votes);
}

function render(polls, votes) {
  const memberId = HUB_MEMBER?.id ?? null;
  const unvoted  = polls.filter(p => !memberId || !hasVoted(p, votes[p.id] ?? {}, memberId));

  const header = `
    <div class="header">
      <span class="header-count">
        ${polls.length === 0 ? "No open polls" :
          unvoted.length > 0 ? `${unvoted.length} need${unvoted.length === 1 ? "s" : ""} your vote` :
          `${polls.length} open`}
      </span>
    </div>`;

  let rows;
  if (polls.length === 0) {
    rows = `<div class="empty">
      <span>No open polls</span>
      <a href="/run/${APP_ID}" style="color:#111827;font-weight:600;font-size:11px">Create one →</a>
    </div>`;
  } else {
    // Sort: unvoted first, then voted
    const sorted = [...polls].sort((a, b) => {
      const av = memberId && hasVoted(a, votes[a.id] ?? {}, memberId);
      const bv = memberId && hasVoted(b, votes[b.id] ?? {}, memberId);
      return av === bv ? 0 : av ? 1 : -1;
    });

    rows = `<div class="poll-list">
      ${sorted.map(p => {
        const v       = votes[p.id] ?? {};
        const voted   = !!(memberId && hasVoted(p, v, memberId));
        const total   = totalUpVotes(p, v);
        const expiry  = expiryLabel(p);

        return `
          <a class="poll-row" href="/run/${APP_ID}">
            <div class="vote-dot ${voted ? "voted" : "pending"}"></div>
            <div class="poll-main">
              <div class="poll-question">${esc(p.question)}</div>
              <div class="poll-meta">
                <span>${p.options.length} options</span>
                ${total > 0 ? `<span>·</span><span>${total} vote${total !== 1 ? "s" : ""}</span>` : ""}
                ${expiry ? `<span>·</span><span style="color:#d97706">${expiry}</span>` : ""}
              </div>
            </div>
            ${voted
              ? `<span class="voted-badge">✓ Voted</span>`
              : `<span class="vote-badge">Vote →</span>`}
          </a>`;
      }).join("")}
    </div>`;
  }

  const footer = `
    <div class="footer">
      <a class="open-link" href="/run/${APP_ID}">All polls →</a>
      <a class="new-link" href="/run/${APP_ID}">+ New poll</a>
    </div>`;

  document.body.innerHTML = header + rows + footer;
}

load().catch(() => {
  document.body.innerHTML = `
    <div class="empty"><a href="/run/${APP_ID}" style="color:#111827;font-weight:600">Open Polls →</a></div>`;
});
</script>
</body>
</html>
